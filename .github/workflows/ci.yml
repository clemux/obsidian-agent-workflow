name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: jdx/mise-action@v3
        with:
          version: 2026.7.7
          install: false
          cache: true
      - run: mise install
      - run: mise run check
