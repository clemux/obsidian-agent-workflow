[settings]
lockfile = true

[tools]
"aqua:astral-sh/uv" = "0.11.28"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:j178/prek" = "0.3.9"

[tasks.test]
description = "Run the test suite"
run = "uv run pytest"

[tasks.lint]
description = "Run Ruff lint checks"
run = "uv run ruff check"

[tasks.format-check]
description = "Check formatting without modifying files"
run = "uv run ruff format --check"

[tasks.typecheck]
description = "Run Pyrefly type checks"
run = "uv run pyrefly check"

[tasks.publication-check]
description = "Check tracked files for publication-boundary violations"
run = "uv run python scripts/check_publication_boundary.py"

[tasks.shellcheck]
description = "Run ShellCheck on maintained shell scripts"
run = "shellcheck scripts/*.sh"

[tasks.hooks-install]
description = "Install Prek-managed Git hooks"
run = "prek install -f"

[tasks.hooks-check]
description = "Run every configured Prek hook against all files"
run = "prek run --all-files"

[tasks.check]
description = "Run the complete verification suite"
run = [
    { task = "lint" },
    { task = "format-check" },
    { task = "typecheck" },
    { task = "publication-check" },
    { task = "shellcheck" },
    { task = "test" },
]
