[project]
name = "oaw"
version = "0.1.0"
description = "Resolve Obsidian IDs and update project task lifecycle state"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
oaw = "oaw.cli:main"

[dependency-groups]
dev = [
    "pyinstrument",
    "pyrefly",
    "pytest",
    "pytest-cov",
    "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oaw"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pyrefly]
project-includes = ["src", "tests"]
python-version = "3.10"
search-path = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
