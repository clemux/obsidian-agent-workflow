[project]
name = "oaw"
version = "0.1.0"
description = "Resolve Obsidian IDs and update project task lifecycle state"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
oaw = "oaw_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
force-include = { "bin/oaw" = "oaw_cli.py" }
